<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Newborn Academy Assistant</title>

  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
    }

    .chat-container {
      width: 100%;
      max-width: 700px;
      background: #1c1c1c;
      border-radius: 16px;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
    }

    #chat {
      height: 400px;
      overflow-y: auto;
      background: #000;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .message {
      margin-bottom: 15px;
      line-height: 1.5;
    }

    .user {
      color: #7dd3fc;
    }

    .bot {
      color: white;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      background: white;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="chat-container">

    <h1>Newborn Academy Assistant</h1>

    <div id="chat"></div>

    <div class="input-row">
      <input
        type="text"
        id="message"
        placeholder="Scrivi un messaggio..."
      />

      <button onclick="sendMessage()">
        Invia
      </button>
    </div>

  </div>

  <script>

    async function sendMessage() {

      const input = document.getElementById('message');
      const chat = document.getElementById('chat');

      const text = input.value;

      if (!text) return;

      chat.innerHTML += `
        <div class="message user">
          <strong>Tu:</strong> ${text}
        </div>
      `;

      input.value = '';

      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: text
        })
      });

      const data = await response.json();

      chat.innerHTML += `
        <div class="message bot">
          <strong>NEO:</strong> ${data.reply}
        </div>
      `;

      chat.scrollTop = chat.scrollHeight;
    }
document.getElementById('message').addEventListener('keydown', function(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    sendMessage();
  }
});
  </script>

</body>
</html>
