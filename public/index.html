<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>NEO - Newborn Academy</title>

  <style>
    body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
}

    .chat-container {
  width: 100%;
  max-width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #111;
}

    h1 {
      margin-top: 0;
    }
.header {
  padding: 18px;
  background: #111;
  border-bottom: 1px solid #222;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header h1 {
  margin: 0;
  font-size: 24px;
}

.header p {
  margin: 5px 0 0;
  opacity: 0.7;
  font-size: 14px;
}

.neo-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: #6b8f71;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 18px;
}
    #chat {
  flex: 1;
  overflow-y: auto;
  background: #000;
  padding: 20px;
}

    .message {
  padding: 12px 16px;
  border-radius: 18px;
  margin-bottom: 12px;
  max-width: 80%;
  line-height: 1.5;
}

.user {
  background: #6b8f71;
  color: white;
  margin-left: auto;
}

.bot {
  background: #222;
  color: white;
}

    .input-row {
  display: flex;
  gap: 10px;
  padding: 15px;
  background: #111;
  position: sticky;
  bottom: 0;
}

    input {
  flex: 1;
  padding: 16px;
  border-radius: 30px;
  border: none;
  background: #222;
  color: white;
  font-size: 16px;
}

    button {
  padding: 14px 22px;
  border: none;
  border-radius: 30px;
  background: #ffffff;
  color: black;
  font-weight: bold;
  cursor: pointer;
}
  </style>
</head>

<body>

  <div class="chat-container">

    
<div class="header">
  <div>
    <h1>NEO</h1>
    <p>Assistente Newborn Academy</p>
  </div>
</div>
    <div id="chat"></div>

    <div class="input-row">
      <input
        type="text"
        id="message"
        placeholder="Scrivi un messaggio..."
      />

      <button onclick="sendMessage()">
        Invia
      </button>
    </div>

  </div>

  <script>

    const conversation = [];
window.onload = function() {

  const chat = document.getElementById('chat');

  const welcomeMessage = `
  <div class="message bot">
    <strong>NEO:</strong><br><br>

    Ciao! Sono NEO 👋<br>
    Sono l’assistente virtuale della Newborn Academy.<br><br>

    Come posso aiutarti?
  </div>
`;

  setTimeout(() => {

  const typingMessage = document.createElement('div');

  typingMessage.className = 'message bot';
  typingMessage.id = 'welcomeTyping';

  typingMessage.innerHTML = `
    <strong>NEO:</strong> sta scrivendo...
  `;

  chat.appendChild(typingMessage);

  chat.scrollTop = chat.scrollHeight;

  setTimeout(() => {

    document.getElementById('welcomeTyping').remove();

    chat.innerHTML += welcomeMessage;

    chat.scrollTop = chat.scrollHeight;

    conversation.push({
      role: 'assistant',
      content: 'Messaggio iniziale inviato'
    });

  }, 1800);

}, 1000);

};
async function sendMessage() {
  const input = document.getElementById('message');
  const chat = document.getElementById('chat');

  const text = input.value.trim();

  if (!text) return;

  conversation.push({
    role: 'user',
    content: text
  });

  chat.innerHTML += `
    <div class="message user">
      <strong>Tu:</strong> ${text}
    </div>
  `;

  input.value = '';
const typingMessage = document.createElement('div');

typingMessage.className = 'message bot';
typingMessage.id = 'typing';

typingMessage.innerHTML = `
  <strong>NEO:</strong> sta scrivendo...
`;

chat.appendChild(typingMessage);

chat.scrollTop = chat.scrollHeight;
  const response = await fetch('/api/chat', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      messages: conversation
    })
  });

  const data = await response.json();
document.getElementById('typing').remove();
  conversation.push({
    role: 'assistant',
    content: data.reply
  });

  chat.innerHTML += `
    <div class="message bot">
      <strong>NEO:</strong> ${data.reply}
    </div>
  `;

  chat.scrollTop = chat.scrollHeight;
}
document.getElementById('message').addEventListener('keydown', function(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    sendMessage();
  }
});
  </script>

</body>
</html>
